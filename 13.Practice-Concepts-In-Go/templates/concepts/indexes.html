<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Indexes</title>
  </head>
  <body>
    <h1>Indexes</h1>
    <p>Indexes are used to access elements in a slice or array.</p>
    <h2>Example</h2>
    <ul>
      {{range $index, $element := .Indexes}}
      <li>{{$index}} - {{$element}}</li>
      {{end}}
    </ul>
  </body>
</html>
